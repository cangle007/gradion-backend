services:
  db:
    image: postgres:16
    container_name: gradion-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gradion
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d gradion']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: gradion-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@db:5432/gradion
      JWT_KEY: dev-secret
    ports:
      - '3000:3000'
    command: sh -c "npm run migrate && npm start"

volumes:
  postgres_data:
